name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Package VSIX
        run: npm run package

      - name: Upload VSIX as artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-hatenablog-${{ github.ref_name }}
          path: "*.vsix"
          retention-days: 90

      - name: Create GitHub Release with VSIX
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
          draft: false
          prerelease: false
